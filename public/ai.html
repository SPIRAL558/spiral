<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIRAL AI — Chat Assistant</title>
<meta name="description" content="Chat with SPIRAL AI, the official assistant for SPIRAL — ask about projects, hosting, and services.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .chat-page {
    padding-top: calc(var(--nav-h) + 24px);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    margin: 0 auto;
    padding-left: 20px;
    padding-right: 20px;
    padding-bottom: 24px;
  }
  .chat-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    margin-bottom: 20px;
  }
  .chat-avatar {
    width: 54px; height: 54px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid var(--accent-2);
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
    flex-shrink: 0;
    position: relative;
  }
  .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .chat-header-info h1 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 3px; }
  .chat-header-info .status { font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .chat-header-info .status .dot-live { width: 7px; height: 7px; border-radius: 50%; background: #34D399; box-shadow: 0 0 8px #34D399; animation: pulse 2s infinite; }
  .chat-clear-btn {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }
  .chat-clear-btn:hover { border-color: var(--border-hover); color: var(--text); }

  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 8px 6px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-height: 50vh;
  }

  .msg { display: flex; gap: 12px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    font-size: 0.94rem;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .msg.ai .msg-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(120deg, var(--accent), #4752C4);
    border-top-right-radius: 4px;
  }

  .typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-2);
    animation: typingBounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } }

  .chat-input-bar {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px;
    position: sticky;
    bottom: 0;
  }
  .chat-input-bar textarea {
    flex: 1;
    resize: none;
    max-height: 140px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    padding: 10px 12px;
    line-height: 1.5;
  }
  .chat-input-bar textarea:focus { outline: none; }
  .chat-send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(120deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s var(--ease), opacity 0.2s ease;
  }
  .chat-send-btn:hover { transform: scale(1.06); }
  .chat-send-btn:disabled { opacity: 0.4; pointer-events: none; }
  .chat-send-btn svg { width: 18px; height: 18px; color: #04121A; }

  .chat-empty-hint {
    text-align: center;
    color: var(--text-dimmer);
    font-size: 0.85rem;
    padding: 40px 20px;
  }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 18px; }
  .suggestion-chip {
    padding: 9px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--text-dim);
  }
  .suggestion-chip:hover { border-color: var(--border-hover); color: var(--text); background: rgba(88,101,242,0.08); }
</style>
</head>
<body>

<div class="loader"><div class="loader-mark"><span>SPIRAL</span><div class="loader-bar"></div></div></div>
<canvas id="particles"></canvas>
<div class="cursor-glow"></div>
<div class="cursor-ring"></div>
<div class="cursor-dot"></div>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span class="dot"></span>SPIRAL</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/projects">Projects</a>
      <a href="/services">Services</a>
      <a href="/hosting">Hosting</a>
      <a href="/portfolio">Portfolio</a>
      <a href="/contact">Contact</a>
      <a href="/faq">FAQ</a>
      <a href="/ai" class="active">SPIRAL AI</a>
      <a href="/contact" class="nav-cta">Hire Me</a>
    </div>
    <button class="nav-toggle" aria-label="Toggle menu"><span></span></button>
  </div>
</nav>

<div class="chat-page">
  <div class="chat-header glass">
    <div class="chat-avatar">
      <img src="profile.jpg" alt="SPIRAL AI avatar">
    </div>
    <div class="chat-header-info">
      <h1>SPIRAL AI <span style="color:var(--text-dimmer); font-weight:400; font-size:0.8rem;">V1</span></h1>
      <div class="status"><span class="dot-live"></span> Online — ask me anything about SPIRAL</div>
    </div>
    <button class="chat-clear-btn" id="clear-chat">Clear chat</button>
  </div>

  <div class="chat-window" id="chat-window">
    <div class="chat-empty-hint" id="empty-hint">
      <p>Ask me about SPIRAL's projects, hosting plans, or services.</p>
      <div class="suggestion-chips">
        <button class="suggestion-chip" data-q="Who is SPIRAL?">Who is SPIRAL?</button>
        <button class="suggestion-chip" data-q="What hosting plans does XYZEN CLOUD offer?">XYZEN CLOUD plans?</button>
        <button class="suggestion-chip" data-q="What projects has SPIRAL built?">What's been built?</button>
        <button class="suggestion-chip" data-q="How do I contact SPIRAL for a project?">How do I get in touch?</button>
      </div>
    </div>
  </div>

  <div class="chat-input-bar glass">
    <textarea id="chat-input" placeholder="Message SPIRAL AI..." rows="1"></textarea>
    <button class="chat-send-btn" id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<a href="/minecraft" class="play-fab hoverable" aria-label="Play Spiral Craft">
  <span class="play-fab-icon">🎮</span>
  <span class="play-fab-text">Play Spiral Craft</span>
</a>

<script src="script.js"></script>
<script src="chat.js"></script>
</body>
</html>
